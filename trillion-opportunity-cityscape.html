        }

        .windows {

            width: 100%;
            height: 100%;
        }
        
        .window {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #ffd700;
            border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite;
        }
        
        .window:nth-child(odd) {
            animation-delay: 1.5s;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        
        .water {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 20%;
            background: linear-gradient(to top, 
                rgba(26, 26, 46, 0.8) 0%, 
                rgba(15, 52, 96, 0.6) 50%, 
                rgba(114, 9, 183, 0.4) 100%);
            animation: wave 4s ease-in-out infinite;
        }
        
        .water::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(255, 215, 0, 0.1) 25%, 
                transparent 50%, 
                rgba(255, 215, 0, 0.1) 75%, 
                transparent 100%);
            animation: shimmer 6s ease-in-out infinite;
        }
        
        @keyframes wave {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
        }
        
        @keyframes shimmer {
            0%, 100% { transform: translateX(-100%); }
            50% { transform: translateX(100%); }
        }
        
        .network-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .network-node {

            width: 8px;
            height: 8px;
            background: #ffd700;
            border-radius: 50%;
            box-shadow: 0 0 20px #ffd700;
            animation: pulse 2s ease-in-out infinite;
        }

        }
        
        .network-line {
            position: absolute;
            height: 1px;
            background: linear-gradient(90deg, transparent, #ffd700, transparent);
            animation: flow 3s ease-in-out infinite;
        }
        
        .network-line:nth-child(9) {

            animation-delay: 0.8s;
        }
        
        @keyframes pulse {
            0%, 100% { 
                transform: scale(1);
                opacity: 0.8;
            }
            50% { 
                transform: scale(1.2);
                opacity: 1;
            }
        }
        
        @keyframes flow {
            0%, 100% { 
                opacity: 0.3;
                transform: scaleX(0.8);
            }
            50% { 
                opacity: 1;
                transform: scaleX(1);
            }
        }
